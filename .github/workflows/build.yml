name: Build

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: go build -ldflags="-s -w -X github.com/WarhoopAll/wowchat/internal/version.Version=dev" -o wowchat ./cmd/wowchat

      - name: Test
        run: go test ./...

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: wowchat-linux-amd64
          path: wowchat
          if-no-files-found: error
