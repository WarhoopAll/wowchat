name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  binaries:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_name }}
        shell: bash
        run: |
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          bin="wowchat-${{ matrix.goos }}-${{ matrix.goarch }}${ext}"
          go build -ldflags="-s -w -X github.com/WarhoopAll/wowchat/internal/version.Version=$VERSION" -o "$bin" ./cmd/wowchat

          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${bin%.exe}.zip" "$bin"
            echo "asset=${bin%.exe}.zip" >> "$GITHUB_ENV"
          else
            tar -czf "${bin}.tar.gz" "$bin"
            echo "asset=${bin}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.asset }}
